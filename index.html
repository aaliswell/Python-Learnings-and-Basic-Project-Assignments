<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Glass Swap Experiment</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-color: #4a5568;
            --glass-border: rgba(143, 168, 155, 0.4);
            --milk-color: #f4f0ea;
            --juice-color: #e5a93b; 
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .laboratory {
            display: flex;
            align-items: flex-end;
            gap: 50px;
            margin-bottom: 40px;
            height: 200px;
        }
        .glass-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            opacity: 0.7;
        }
        .glass {
            width: 85px;
            height: 130px;
            border: 3px solid var(--glass-border);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.4);
        }
        .mug { width: 95px; height: 105px; border-radius: 8px; }
        .mug::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 22px;
            width: 18px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-left: none;
            border-radius: 0 14px 14px 0;
        }
        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80%; 
            transition: height 0.6s ease-in-out, background-color 0.4s ease;
        }
        .milk { background-color: var(--milk-color); }
        .juice { background-color: var(--juice-color); }
        .empty { height: 0%; }
        .btn {
            background-color: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px 28px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn:hover:not(:disabled) {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        .console {
            margin-top: 30px;
            font-family: monospace;
            font-size: 0.9rem;
            background: #f4f1eb;
            padding: 15px 25px;
            border-radius: 6px;
            min-width: 280px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <h1>The Swap Logic</h1>
    <p style="margin-top:0; opacity:0.7;">Visualizing variable assignment step-by-step</p>

    <div class="laboratory">
        <div class="glass-container">
            <div class="glass"><div id="l1" class="liquid milk"></div></div>
            <div class="label" id="lbl1">Glass 1: Milk</div>
        </div>
        <div class="glass-container">
            <div class="glass mug"><div id="lm" class="liquid empty"></div></div>
            <div class="label" id="lblm">Mug: Empty</div>
        </div>
        <div class="glass-container">
            <div class="glass"><div id="l2" class="liquid juice"></div></div>
            <div class="label" id="lbl2">Glass 2: Juice</div>
        </div>
    </div>

    <button class="btn" id="btn" onclick="runSwap()">Run Code</button>
    <div class="console" id="out">// Click "Run Code" to execute</div>

    <script>
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        async function runSwap() {
            const btn = document.getElementById('btn');
            const out = document.getElementById('out');
            if(btn.innerText === "RESET EXPERIMENT") { reset(); return; }
            btn.disabled = true;

            out.innerHTML = "Mug = Glass1";
            document.getElementById('l1').className = "liquid empty";
            document.getElementById('lm').className = "liquid milk";
            document.getElementById('lbl1').innerText = "Glass 1: Empty";
            document.getElementById('lblm').innerText = "Mug: Milk";
            await sleep(1200);

            out.innerHTML = "Glass1 = Glass2";
            document.getElementById('l2').className = "liquid empty";
            document.getElementById('l1').className = "liquid juice";
            document.getElementById('lbl2').innerText = "Glass 2: Empty";
            document.getElementById('lbl1').innerText = "Glass 1: Juice";
            await sleep(1200);

            out.innerHTML = "Glass2 = Mug";
            document.getElementById('lm').className = "liquid empty";
            document.getElementById('l2').className = "liquid milk";
            document.getElementById('lblm').innerText = "Mug: Empty";
            document.getElementById('lbl2').innerText = "Glass 2: Milk";
            await sleep(1200);

            out.innerHTML = "<strong>print(Glass1, Glass2)</strong><br><br>👉 Output: 'Juice', 'Milk'";
            btn.innerText = "RESET EXPERIMENT";
            btn.disabled = false;
        }
        function reset() {
            document.getElementById('l1').className = "liquid milk";
            document.getElementById('l2').className = "liquid juice";
            document.getElementById('lm').className = "liquid empty";
            document.getElementById('lbl1').innerText = "Glass 1: Milk";
            document.getElementById('lbl2').innerText = "Glass 2: Juice";
            document.getElementById('lblm').innerText = "Mug: Empty";
            document.getElementById('out').innerHTML = "// Click 'Run Code' to execute";
            document.getElementById('btn').innerText = "Run Code";
        }
    </script>
</body>
</html>
